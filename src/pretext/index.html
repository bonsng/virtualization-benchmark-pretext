<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pretext | Benchmark</title>
  <link rel="stylesheet" href="../shared/styles.css" />
  <style>
    .chat-canvas {
      position: relative;
    }
    .msg {
      position: absolute;
      left: 0;
      width: 100%;
      padding-inline: 22px;
      display: flex;
    }
    .msg--assistant { justify-content: flex-start; }
    .msg--user { justify-content: flex-end; }
    .msg-bubble {
      position: relative;
      flex: 0 0 auto;
      max-width: 100%;
      border-radius: 12px;
    }
    .msg--user .msg-bubble {
      background: #e8f0fe;
      color: #1a1a1a;
      border-bottom-right-radius: 4px;
    }
    .msg--assistant .msg-bubble {
      background: #fff;
      border: 1px solid #e0ddd7;
      border-bottom-left-radius: 4px;
    }
    .block {
      position: absolute;
      left: 0;
      width: 100%;
    }
    .quote-rail {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 3px;
      border-radius: 999px;
      background: rgba(74, 156, 94, 0.25);
    }
    .block-marker {
      position: absolute;
      white-space: pre;
      color: #999;
      font: 600 11px/1 "SF Mono", ui-monospace, Menlo, monospace;
    }
    .line-row {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 0;
      width: max-content;
    }
    .frag {
      display: inline-block;
      white-space: pre;
      line-height: 1;
      color: #2c2c2c;
      vertical-align: baseline;
    }
    .frag--body {
      font: 400 14px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .frag--heading-1 {
      font: 700 20px/1 "Iowan Old Style", Georgia, "Times New Roman", serif;
      letter-spacing: -0.01em;
    }
    .frag--heading-2 {
      font: 700 17px/1 "Iowan Old Style", Georgia, "Times New Roman", serif;
      letter-spacing: -0.01em;
    }
    .frag--code {
      padding: 2px 6px 3px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.06);
      font: 600 12px/1 "SF Mono", ui-monospace, Menlo, monospace;
    }
    .frag--chip {
      display: inline-flex;
      align-items: center;
      padding: 0 7px;
      min-height: 18px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.06);
      color: #4a9c5e;
      font: 700 11px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transform: translateY(1px);
    }
    .is-link {
      color: #4a9c5e;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 0.14em;
    }
    .is-em { font-style: italic; }
    .is-strong { font-weight: 700; }
    .is-del { text-decoration: line-through; text-decoration-thickness: 1px; }
    .code-box {
      position: absolute;
      top: 0;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.04);
    }
    .code-line {
      position: absolute;
      white-space: pre;
      font: 500 12px/18px "SF Mono", ui-monospace, Menlo, Monaco, monospace;
      color: #2c2c2c;
    }
    .rule-line {
      position: absolute;
      height: 1px;
      background: #e0ddd7;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
