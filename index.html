<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtualization Benchmark</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: rgb(248, 245, 239); color: #2c2c2c; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #1a1a1a; }
    p { color: #6b6b6b; margin-bottom: 2rem; }
    .cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; max-width: 600px; width: 100%; padding: 0 1rem; }
    .card { background: #fff; border: 1px solid #e0ddd7; border-radius: 8px; padding: 1.5rem; text-decoration: none; color: #2c2c2c; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; }
    .card:hover { transform: translateY(-4px); border-color: #b0aba2; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    .card h2 { font-size: 1.1rem; margin-bottom: 0.5rem; color: #1a1a1a; }
    .card p { font-size: 0.85rem; margin-bottom: 0; }
    .card.dashboard { grid-column: span 2; border-color: #4a9c5e; }
  </style>
</head>
<body>
  <h1>Virtualization Benchmark</h1>
  <p>DOM 없이 텍스트 레이아웃을 계산하는 Pretext가 가상화에서 얼마나 차이를 만드는지,<br>세 가지 방식으로 직접 비교해봅니다.</p>
  <div class="cards">
    <a class="card" href="src/no-virtualization/">
      <h2>No Virtualization</h2>
      <p>React, 전체 DOM 렌더링. 성능 하한선 기준.</p>
    </a>
    <a class="card" href="src/react-virtual/">
      <h2>React Virtual</h2>
      <p>@tanstack/react-virtual 기반 DOM 실측 가상화.</p>
    </a>
    <a class="card" href="src/pretext/">
      <h2>Pretext</h2>
      <p>Vanilla DOM + pretext 사전 계산 가상화.</p>
    </a>
    <a class="card dashboard" href="src/dashboard/">
      <h2>Dashboard</h2>
      <p>세 방식의 벤치마크 결과 비교.</p>
    </a>
  </div>
</body>
</html>
