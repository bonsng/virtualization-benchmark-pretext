<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Benchmark</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: rgb(248, 245, 239);
      color: #2c2c2c;
      min-height: 100vh;
    }
    .dashboard {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .dashboard-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 12px;
      color: #4a9c5e;
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:hover { text-decoration: underline; }
    .dashboard-header h1 {
      font-size: 1.8rem;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    .subtitle { color: #6b6b6b; font-size: 14px; }

    /* Summary Cards */
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    .summary-card {
      background: #fff;
      border: 1px solid #e0ddd7;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }
    .summary-card h3 {
      font-size: 15px;
      margin-bottom: 16px;
      color: #1a1a1a;
    }
    .stat { margin-bottom: 10px; }
    .stat-value {
      display: block;
      font-size: 1.5rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #1a1a1a;
    }
    .stat-label {
      font-size: 12px;
      color: #8a8a8a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Charts */
    .charts {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }
    .chart-card {
      background: #fff;
      border: 1px solid #e0ddd7;
      border-radius: 10px;
      padding: 24px;
    }
    .chart-card h2 {
      font-size: 16px;
      margin-bottom: 4px;
      color: #1a1a1a;
    }
    .chart-desc {
      font-size: 13px;
      color: #8a8a8a;
      margin-bottom: 20px;
    }
    .bar-chart { display: flex; flex-direction: column; gap: 12px; }
    .bar-row {
      display: grid;
      grid-template-columns: 140px 1fr 80px;
      align-items: center;
      gap: 12px;
    }
    .bar-label {
      font-size: 13px;
      font-weight: 500;
      text-align: right;
      color: #4a4a4a;
    }
    .bar-track {
      height: 28px;
      background: #f0ede7;
      border-radius: 6px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.6s ease;
    }
    .bar-value {
      font-size: 14px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: #1a1a1a;
    }

    /* Insight */
    .insight-card {
      background: #fff;
      border: 1px solid #e0ddd7;
      border-radius: 10px;
      padding: 24px;
    }
    .insight-card h2 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #1a1a1a;
    }
    .insight-card ul {
      list-style: none;
      padding: 0;
    }
    .insight-card li {
      padding: 8px 0;
      border-bottom: 1px solid #f0ede7;
      font-size: 14px;
      line-height: 1.6;
    }
    .insight-card li:last-child { border-bottom: none; }

    @media (max-width: 640px) {
      .summary-cards { grid-template-columns: 1fr; }
      .bar-row { grid-template-columns: 100px 1fr 60px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
