<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtualization Benchmark</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e1e4e8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    p { color: #8b949e; margin-bottom: 2rem; }
    .cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; max-width: 600px; width: 100%; padding: 0 1rem; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.5rem; text-decoration: none; color: #e1e4e8; transition: border-color 0.2s; }
    .card:hover { border-color: #58a6ff; }
    .card h2 { font-size: 1.1rem; margin-bottom: 0.5rem; }
    .card p { font-size: 0.85rem; margin-bottom: 0; }
    .card.dashboard { grid-column: span 2; border-color: #238636; }
  </style>
</head>
<body>
  <h1>Virtualization Benchmark</h1>
  <p>채팅 가상화 방식 비교 벤치마크</p>
  <div class="cards">
    <a class="card" href="/src/no-virtualization/">
      <h2>No Virtualization</h2>
      <p>React, 전체 DOM 렌더링. 성능 하한선 기준.</p>
    </a>
    <a class="card" href="/src/react-virtual/">
      <h2>React Virtual</h2>
      <p>@tanstack/react-virtual 기반 DOM 실측 가상화.</p>
    </a>
    <a class="card" href="/src/pretext/">
      <h2>Pretext</h2>
      <p>Vanilla DOM + pretext 사전 계산 가상화.</p>
    </a>
    <a class="card dashboard" href="/src/dashboard/">
      <h2>Dashboard</h2>
      <p>세 방식의 벤치마크 결과 비교.</p>
    </a>
  </div>
</body>
</html>
